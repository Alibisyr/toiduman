<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <!--
    Toiduman ornament watermark (ою-өрнек / qoshqar-muiz).
    Faint gold linework on a diamond lattice. Baked low opacity so it can be
    tiled straight as a CSS background and read as premium texture, not noise.
  -->
  <g fill="none" stroke="#9a7322" stroke-linecap="round" stroke-linejoin="round">
    <!-- diamond lattice (meets at edge midpoints so tiles connect seamlessly) -->
    <path d="M130 0 L260 130 L130 260 L0 130 Z" stroke-width="1.2" opacity="0.045" />

    <g opacity="0.07" stroke-width="2">
      <!-- central horned medallion -->
      <path d="M130 86 L174 130 L130 174 L86 130 Z" />
      <circle cx="130" cy="130" r="5" />

      <!-- top vertex horns -->
      <path d="M130 86 C130 64 152 58 158 76 C161 86 149 92 145 80" />
      <path d="M130 86 C130 64 108 58 102 76 C99 86 111 92 115 80" />
      <!-- right vertex horns -->
      <path d="M174 130 C196 130 202 108 184 102 C174 99 168 111 180 115" />
      <path d="M174 130 C196 130 202 152 184 158 C174 161 168 149 180 145" />
      <!-- bottom vertex horns -->
      <path d="M130 174 C130 196 152 202 158 184 C161 174 149 168 145 180" />
      <path d="M130 174 C130 196 108 202 102 184 C99 174 111 168 115 180" />
      <!-- left vertex horns -->
      <path d="M86 130 C64 130 58 108 76 102 C86 99 92 111 80 115" />
      <path d="M86 130 C64 130 58 152 76 158 C86 161 92 149 80 145" />
    </g>
  </g>
</svg>
